<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">No1gen — idea to product</title>
  <desc id="desc">A minimalist animated orbital mark above a blue horizon for a mobile startup creator and product engineer.</desc>

  <defs>
    <clipPath id="frame">
      <rect width="1600" height="420" rx="22"/>
    </clipPath>
    <style>
      .eyebrow {
        fill: #8690a3;
        font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        letter-spacing: 3.2px;
      }
      .headline {
        fill: #f4f6f8;
        font: 600 76px 'Helvetica Neue', Helvetica, Arial, sans-serif;
        letter-spacing: -3.8px;
      }
      .role {
        fill: #aeb6c5;
        font: 400 18px 'Helvetica Neue', Helvetica, Arial, sans-serif;
        letter-spacing: .4px;
      }
      .status {
        fill: #758096;
        font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        letter-spacing: 2.2px;
      }
      .orbit {
        transform-origin: 1270px 198px;
        animation: orbit 28s linear infinite;
      }
      .satellite {
        transform-origin: 1270px 198px;
        animation: orbit-back 18s linear infinite;
      }
      .pulse {
        transform-origin: 1270px 198px;
        animation: pulse 5s ease-out infinite;
      }
      .signal {
        animation: signal 4s ease-in-out infinite;
      }
      .horizon {
        animation: horizon 7s ease-in-out infinite;
      }
      @keyframes orbit {
        to { transform: rotate(360deg); }
      }
      @keyframes orbit-back {
        to { transform: rotate(-360deg); }
      }
      @keyframes pulse {
        0% { transform: scale(.72); opacity: 0; }
        30% { opacity: .38; }
        100% { transform: scale(1.42); opacity: 0; }
      }
      @keyframes signal {
        0%, 100% { opacity: .36; }
        50% { opacity: 1; }
      }
      @keyframes horizon {
        0%, 100% { opacity: .58; }
        50% { opacity: .92; }
      }
      @media (prefers-reduced-motion: reduce) {
        .orbit, .satellite, .pulse, .signal, .horizon { animation: none; }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1600" height="420" fill="#07080c"/>

    <g transform="translate(82 70)">
      <text class="eyebrow" x="0" y="0">NO1GEN / MOBILE PRODUCT STUDIO</text>
      <rect x="0" y="25" width="42" height="2" rx="1" fill="#7f7ac5"/>

      <text class="headline" x="0" y="116">IDEA → PRODUCT</text>
      <text class="role" x="3" y="161">Startup creator &amp; mobile product engineer</text>

      <g transform="translate(3 231)">
        <circle class="signal" cx="5" cy="5" r="5" fill="#739bc8"/>
        <text class="status" x="24" y="10">BUILDING WHAT'S NEXT</text>
      </g>
    </g>

    <g aria-label="Animated orbital product symbol">
      <circle cx="1270" cy="198" r="116" fill="none" stroke="#20232d" stroke-width="1"/>
      <circle cx="1270" cy="198" r="82" fill="none" stroke="#161923" stroke-width="1"/>

      <g class="orbit">
        <circle cx="1270" cy="198" r="101" fill="none" stroke="#7771b5" stroke-width="3" stroke-linecap="round" stroke-dasharray="28 25"/>
        <rect x="1258" y="84" width="24" height="10" rx="5" fill="#9a96ca"/>
        <rect x="1258" y="302" width="24" height="10" rx="5" fill="#55517f"/>
        <rect x="1156" y="193" width="10" height="24" rx="5" fill="#69659d"/>
        <rect x="1374" y="179" width="10" height="24" rx="5" fill="#8782bd"/>
      </g>

      <g class="satellite">
        <circle cx="1270" cy="198" r="70" fill="none" stroke="#2f3e52" stroke-width="1" stroke-dasharray="2 12"/>
        <g transform="translate(1270 128)">
          <rect x="-15" y="-6" width="30" height="12" rx="6" fill="#739bc8"/>
          <rect x="-5" y="-3" width="10" height="6" rx="3" fill="#d6e1ed"/>
        </g>
      </g>

      <circle class="pulse" cx="1270" cy="198" r="49" fill="none" stroke="#739bc8" stroke-width="1"/>
      <circle cx="1270" cy="198" r="47" fill="#0b0d13" stroke="#343849" stroke-width="1"/>
      <circle cx="1270" cy="198" r="32" fill="#171824"/>
      <text x="1270" y="206" text-anchor="middle" fill="#f3f4f7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="-1">01</text>
      <circle class="signal" cx="1310" cy="163" r="3" fill="#8fb1d4"/>
    </g>

    <path d="M-80 455 Q800 250 1680 455 L1680 500 L-80 500Z" fill="#0a1018"/>
    <path class="horizon" d="M-80 455 Q800 250 1680 455" fill="none" stroke="#628bb8" stroke-width="2"/>
    <path d="M-80 462 Q800 260 1680 462" fill="none" stroke="#28394d" stroke-width="1"/>

    <text class="status" x="1518" y="381" text-anchor="end">01 / SHIP</text>
    <rect x=".5" y=".5" width="1599" height="419" rx="21.5" fill="none" stroke="#20232d"/>
  </g>
</svg>
