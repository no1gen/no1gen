<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="440" viewBox="0 0 1600 440" role="img" aria-labelledby="title desc">
  <title id="title">No1gen orbital product lab</title>
  <desc id="desc">An animated orbital system above a luminous blue horizon, representing the path from idea to mobile product launch.</desc>

  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020307"/>
      <stop offset="0.52" stop-color="#050712"/>
      <stop offset="1" stop-color="#09091a"/>
    </linearGradient>
    <linearGradient id="earth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#163f69"/>
      <stop offset="0.18" stop-color="#0d2747"/>
      <stop offset="1" stop-color="#02050c"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e40af" stop-opacity="0"/>
      <stop offset="0.23" stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#7dd3fc"/>
      <stop offset="0.78" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#1e40af" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="0.18" stop-color="#60a5fa"/>
      <stop offset="0.62" stop-color="#312e81"/>
      <stop offset="1" stop-color="#09091a"/>
    </radialGradient>
    <linearGradient id="module" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.26" stop-color="#4338ca"/>
      <stop offset="0.7" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="blueGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="1600" height="440" rx="24"/></clipPath>
    <path id="signalPath" d="M690 211 C820 130 920 288 1070 210 C1120 184 1154 176 1190 187"/>
    <style>
      .grid { stroke:#93c5fd; stroke-opacity:.055; stroke-width:1; }
      .micro { fill:#93a4bd; font:500 12px ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:2.4px; }
      .label { fill:#dbeafe; font:650 13px ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:2px; }
      .headline { fill:#f8fafc; font:760 70px Inter,ui-sans-serif,system-ui,sans-serif; letter-spacing:-3px; }
      .subhead { fill:#93c5fd; font:560 15px Inter,ui-sans-serif,system-ui,sans-serif; letter-spacing:4px; }
      .dash { stroke-dasharray:8 14; animation:dash 12s linear infinite; }
      .scan { animation:scan 7s ease-in-out infinite; }
      .blink { animation:blink 3.6s ease-in-out infinite; }
      .blink-delayed { animation:blink 3.6s 1.8s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset:-220; } }
      @keyframes scan { 0%,100% { transform:translateY(-70px); opacity:0; } 18%,74% { opacity:.22; } 55% { transform:translateY(390px); opacity:.12; } }
      @keyframes blink { 0%,100% { opacity:.18; } 50% { opacity:1; } }
      @media (prefers-reduced-motion: reduce) { .dash,.scan,.blink,.blink-delayed { animation:none; } }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1600" height="440" fill="url(#space)"/>

    <g opacity=".72">
      <path class="grid" d="M0 72H1600M0 146H1600M0 220H1600M0 294H1600M0 368H1600"/>
      <path class="grid" d="M120 0V440M280 0V440M440 0V440M600 0V440M760 0V440M920 0V440M1080 0V440M1240 0V440M1400 0V440"/>
    </g>

    <g fill="#93c5fd">
      <circle cx="90" cy="54" r="1.4" class="blink"/>
      <circle cx="178" cy="116" r="1" opacity=".35"/>
      <circle cx="348" cy="61" r="1.2" class="blink-delayed"/>
      <circle cx="562" cy="102" r="1" opacity=".4"/>
      <circle cx="804" cy="50" r="1.5" class="blink"/>
      <circle cx="1015" cy="94" r="1" opacity=".32"/>
      <circle cx="1484" cy="76" r="1.4" class="blink-delayed"/>
      <circle cx="1552" cy="194" r="1" opacity=".42"/>
    </g>

    <g transform="translate(72 65)">
      <text class="micro" x="0" y="0">NO1GEN / ORBITAL PRODUCT LAB</text>
      <rect x="0" y="28" width="66" height="2" fill="#60a5fa"/>
      <rect x="74" y="28" width="16" height="2" fill="#6366f1" opacity=".7"/>
      <text class="headline" x="0" y="116">ZERO → ONE</text>
      <text class="subhead" x="4" y="158">MOBILE PRODUCTS / STARTUPS / LAUNCH</text>

      <g transform="translate(4 198)">
        <circle cx="5" cy="5" r="5" fill="#60a5fa" filter="url(#softGlow)"/>
        <text class="label" x="22" y="10">BUILD SIGNAL: ACTIVE</text>
        <text class="micro" x="0" y="52">01 IDEA</text>
        <text class="micro" x="145" y="52">02 PROTOTYPE</text>
        <text class="micro" x="340" y="52">03 PRODUCT</text>
        <text class="micro" x="505" y="52">04 LAUNCH</text>
        <path d="M0 68H575" stroke="#334155" stroke-width="2"/>
        <path d="M0 68H575" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="34 110" class="dash" filter="url(#softGlow)"/>
        <circle cx="0" cy="68" r="4" fill="#93c5fd"/>
        <circle cx="145" cy="68" r="4" fill="#818cf8"/>
        <circle cx="340" cy="68" r="4" fill="#6366f1"/>
        <circle cx="575" cy="68" r="5" fill="#e0f2fe" filter="url(#softGlow)"/>
      </g>
    </g>

    <g opacity=".44">
      <use href="#signalPath" fill="none" stroke="#818cf8" stroke-width="1.4" stroke-dasharray="4 10" class="dash"/>
      <circle r="3.2" fill="#7dd3fc" filter="url(#softGlow)">
        <animateMotion dur="5.6s" repeatCount="indefinite"><mpath href="#signalPath"/></animateMotion>
      </circle>
      <circle r="2.2" fill="#a78bfa">
        <animateMotion dur="5.6s" begin="-2.8s" repeatCount="indefinite"><mpath href="#signalPath"/></animateMotion>
      </circle>
    </g>

    <g opacity="0">
      <circle cx="1240" cy="208" r="132" fill="none" stroke="#4f46e5" stroke-opacity=".22" stroke-width="1" stroke-dasharray="2 12"/>
      <circle cx="1240" cy="208" r="103" fill="none" stroke="#60a5fa" stroke-opacity=".16" stroke-width="1.2"/>
      <circle cx="1240" cy="208" r="72" fill="none" stroke="#a78bfa" stroke-opacity=".18" stroke-width="1" stroke-dasharray="14 8" class="dash"/>

      <g>
        <g transform="rotate(0 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(30 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(60 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(90 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(120 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(150 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(180 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(210 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(240 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(270 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(300 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <g transform="rotate(330 1240 208)"><rect x="1218" y="61" width="44" height="36" rx="7" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".55"/><path d="M1226 70H1254M1226 77H1246" stroke="#e0e7ff" stroke-opacity=".35"/></g>
        <animateTransform attributeName="transform" type="rotate" from="0 1240 208" to="360 1240 208" dur="28s" repeatCount="indefinite"/>
      </g>

      <g>
        <circle cx="1240" cy="208" r="58" fill="#070916" stroke="#818cf8" stroke-opacity=".46"/>
        <circle cx="1240" cy="208" r="42" fill="url(#core)" filter="url(#softGlow)"/>
        <path d="M1219 226V190L1240 216L1261 190V226" fill="none" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="1240" cy="208" r="62" fill="none" stroke="#7dd3fc" stroke-width="2" opacity=".28">
          <animate attributeName="r" values="62;82;62" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".38;0;.38" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <path d="M-80 500 Q800 175 1680 500 L1680 560 L-80 560Z" fill="url(#earth)"/>
    <path d="M-80 500 Q800 175 1680 500" fill="none" stroke="url(#horizon)" stroke-width="5" filter="url(#blueGlow)">
      <animate attributeName="stroke-width" values="4;8;4" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".72;1;.72" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M-80 510 Q800 193 1680 510" fill="none" stroke="#93c5fd" stroke-opacity=".15" stroke-width="1" stroke-dasharray="2 10" class="dash"/>

    <g transform="translate(1240 205)">
      <circle r="142" fill="#050712" fill-opacity=".68" stroke="#4338ca" stroke-opacity=".18"/>
      <circle r="126" fill="none" stroke="#818cf8" stroke-opacity=".35" stroke-width="1" stroke-dasharray="2 11" class="dash"/>
      <circle r="96" fill="none" stroke="#60a5fa" stroke-opacity=".22" stroke-width="1.4"/>
      <circle r="72" fill="none" stroke="#a78bfa" stroke-opacity=".28" stroke-dasharray="16 8" class="dash"/>

      <g>
        <g transform="rotate(0) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <g transform="rotate(45) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <g transform="rotate(90) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <g transform="rotate(135) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <g transform="rotate(180) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <g transform="rotate(225) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <g transform="rotate(270) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <g transform="rotate(315) translate(0 -119)"><rect x="-18" y="-14" width="36" height="28" rx="6" fill="url(#module)" stroke="#c4b5fd" stroke-opacity=".7"/><path d="M-10-6H10M-10 1H5" stroke="#e0e7ff" stroke-opacity=".4"/></g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
      </g>

      <g>
        <circle r="58" fill="#080a18" stroke="#818cf8" stroke-opacity=".52"/>
        <circle r="43" fill="url(#core)" filter="url(#softGlow)"/>
        <path d="M-22 20V-20L0 9L22-20V20" fill="none" stroke="#f8fafc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle r="64" fill="none" stroke="#7dd3fc" stroke-width="2" opacity=".32">
          <animate attributeName="r" values="64;86;64" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".38;0;.38" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>

      <path d="M-176 0H-148M148 0H176M0-176V-148M0 148V176" stroke="#60a5fa" stroke-opacity=".34"/>
      <text class="micro" x="104" y="160">ORBIT / 01</text>
    </g>

    <rect class="scan" x="0" y="0" width="1600" height="70" fill="url(#horizon)" opacity="0"/>
    <rect x=".5" y=".5" width="1599" height="439" rx="23.5" fill="none" stroke="#334155" stroke-opacity=".72"/>
  </g>
</svg>
