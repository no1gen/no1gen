<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">NO1GEN — startup creator and mobile app engineer</title>
  <desc id="desc">A minimalist animated profile banner with a detailed rotating orbital station above Earth.</desc>

  <defs>
    <clipPath id="frame">
      <rect width="1600" height="420" rx="22"/>
    </clipPath>

    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#777a89"/>
      <stop offset=".28" stop-color="#343641"/>
      <stop offset=".66" stop-color="#1b1c24"/>
      <stop offset="1" stop-color="#575466"/>
    </linearGradient>
    <linearGradient id="metalEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a3a5b0"/>
      <stop offset=".45" stop-color="#4b4d58"/>
      <stop offset="1" stop-color="#22232b"/>
    </linearGradient>
    <linearGradient id="panelViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#706b99"/>
      <stop offset=".5" stop-color="#35314f"/>
      <stop offset="1" stop-color="#171622"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66819c"/>
      <stop offset=".5" stop-color="#304154"/>
      <stop offset="1" stop-color="#141b24"/>
    </linearGradient>
    <radialGradient id="hub" cx=".38" cy=".3" r=".8">
      <stop offset="0" stop-color="#808392"/>
      <stop offset=".28" stop-color="#3c3e49"/>
      <stop offset=".72" stop-color="#15161d"/>
      <stop offset="1" stop-color="#08090d"/>
    </radialGradient>
    <filter id="stationDepth" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity=".34"/>
    </filter>

    <g id="module-violet">
      <rect x="-24" y="-126" width="48" height="28" rx="3.5" fill="url(#metal)" stroke="#8b8998" stroke-opacity=".45"/>
      <rect x="-19" y="-122" width="38" height="18" rx="1.5" fill="url(#panelViolet)"/>
      <path d="M-9-122v18M1-122v18M11-122v18" stroke="#aaa5c5" stroke-opacity=".28"/>
      <path d="M-19-113h38" stroke="#c3bfd6" stroke-opacity=".22"/>
      <rect x="-6" y="-99" width="12" height="10" rx="2" fill="#383943"/>
    </g>
    <g id="module-blue">
      <rect x="-24" y="-126" width="48" height="28" rx="3.5" fill="url(#metal)" stroke="#8b8998" stroke-opacity=".45"/>
      <rect x="-19" y="-122" width="38" height="18" rx="1.5" fill="url(#panelBlue)"/>
      <path d="M-9-122v18M1-122v18M11-122v18" stroke="#a8c0d5" stroke-opacity=".25"/>
      <path d="M-19-113h38" stroke="#c5d4df" stroke-opacity=".2"/>
      <rect x="-6" y="-99" width="12" height="10" rx="2" fill="#383943"/>
    </g>
    <g id="module-service">
      <path d="M-22-123-15-129H15L22-123V-101L15-96H-15L-22-101Z" fill="url(#metalEdge)" stroke="#a5a6ae" stroke-opacity=".48"/>
      <rect x="-13" y="-121" width="26" height="16" rx="3" fill="#262833"/>
      <circle cx="0" cy="-113" r="4.5" fill="#8faec8"/>
      <circle cx="0" cy="-113" r="1.8" fill="#e2edf5"/>
      <rect x="-6" y="-97" width="12" height="8" rx="2" fill="#3a3b46"/>
    </g>
    <g id="spoke">
      <path d="M0-88V-38" stroke="#5c5e69" stroke-width="6" stroke-linecap="round"/>
      <path d="M0-85V-40" stroke="#9799a3" stroke-opacity=".34" stroke-width="1.2"/>
      <circle cy="-86" r="5" fill="#24262f" stroke="#858792" stroke-opacity=".5"/>
    </g>

    <style>
      .headline {
        fill: #f4f6f8;
        font: 600 102px Geist, 'SF Pro Display', 'Avenir Next', sans-serif;
        letter-spacing: -5px;
      }
      .role {
        fill: #b9c0cc;
        font: 500 23px Geist, 'SF Pro Display', 'Avenir Next', sans-serif;
        letter-spacing: .2px;
      }
      .about {
        fill: #778196;
        font: 400 17px Geist, 'SF Pro Text', 'Avenir Next', sans-serif;
        letter-spacing: .2px;
      }
      .station-spin {
        transform-origin: 0 0;
        animation: station-spin 42s cubic-bezier(.45,.03,.55,.97) infinite;
      }
      .beacon {
        animation: beacon 4.8s cubic-bezier(.32,.72,0,1) infinite;
      }
      .horizon {
        animation: horizon 8s cubic-bezier(.32,.72,0,1) infinite;
      }
      @keyframes station-spin {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(180deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes beacon {
        0%, 72%, 100% { opacity: .28; transform: scale(.82); }
        82% { opacity: 1; transform: scale(1.3); }
      }
      @keyframes horizon {
        0%, 100% { opacity: .58; }
        50% { opacity: .9; }
      }
      @media (prefers-reduced-motion: reduce) {
        .station-spin, .beacon, .horizon { animation: none; }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1600" height="420" fill="#07080c"/>

    <g transform="translate(82 72)">
      <rect x="0" y="0" width="42" height="2" rx="1" fill="#7f7ac5"/>
      <text class="headline" x="0" y="116">NO1GEN</text>
      <text class="role" x="3" y="166">Startup creator &amp; mobile app engineer</text>
      <text class="about" x="3" y="207">I build useful mobile products from concept to launch.</text>
    </g>

    <g transform="translate(1280 190) rotate(-8) scale(1 .9)" filter="url(#stationDepth)" aria-label="Animated orbital station">
      <g class="station-spin">
        <circle r="91" fill="none" stroke="#1c1e26" stroke-width="18"/>
        <circle r="91" fill="none" stroke="#666873" stroke-width="3"/>
        <circle r="82" fill="none" stroke="#a0a2ab" stroke-opacity=".3" stroke-width="1"/>
        <circle r="101" fill="none" stroke="#383a45" stroke-width="5" stroke-dasharray="16 8"/>

        <use href="#spoke" transform="rotate(0)"/>
        <use href="#spoke" transform="rotate(60)"/>
        <use href="#spoke" transform="rotate(120)"/>
        <use href="#spoke" transform="rotate(180)"/>
        <use href="#spoke" transform="rotate(240)"/>
        <use href="#spoke" transform="rotate(300)"/>

        <use href="#module-service" transform="rotate(0)"/>
        <use href="#module-violet" transform="rotate(30)"/>
        <use href="#module-blue" transform="rotate(60)"/>
        <use href="#module-violet" transform="rotate(90)"/>
        <use href="#module-blue" transform="rotate(120)"/>
        <use href="#module-violet" transform="rotate(150)"/>
        <use href="#module-service" transform="rotate(180)"/>
        <use href="#module-blue" transform="rotate(210)"/>
        <use href="#module-violet" transform="rotate(240)"/>
        <use href="#module-blue" transform="rotate(270)"/>
        <use href="#module-violet" transform="rotate(300)"/>
        <use href="#module-blue" transform="rotate(330)"/>

        <circle r="37" fill="#111219" stroke="#686a76" stroke-width="5"/>
        <circle r="28" fill="url(#hub)" stroke="#aaaab2" stroke-opacity=".4"/>
        <path d="M-18 0H18M0-18V18" stroke="#838591" stroke-width="5" stroke-linecap="round"/>
        <circle r="9" fill="#090a0e" stroke="#9b9da6" stroke-width="2"/>
        <circle r="3.5" fill="#778da3"/>

        <g class="beacon" transform="translate(19 -22)">
          <circle r="5.5" fill="#10151c"/>
          <circle r="2.8" fill="#b6d7ef"/>
        </g>
      </g>
    </g>

    <path d="M-80 455 Q800 250 1680 455 L1680 500 L-80 500Z" fill="#0a1018"/>
    <path class="horizon" d="M-80 455 Q800 250 1680 455" fill="none" stroke="#628bb8" stroke-width="2"/>
    <path d="M-80 462 Q800 260 1680 462" fill="none" stroke="#28394d" stroke-width="1"/>

    <rect x=".5" y=".5" width="1599" height="419" rx="21.5" fill="none" stroke="#20232d"/>
  </g>
</svg>
